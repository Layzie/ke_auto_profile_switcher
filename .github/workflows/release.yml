name: Release to crates.io (trusted publishing)

# main への push で Cargo.toml の version を読み取り、crates.io に未公開なら
# crates.io へ公開し、公開成功後に v{version} タグを作成・push する。公開を
# 先に行うことで、公開が失敗したときにタグだけが残り、再実行が「タグ既存」で
# スキップされてしまう問題を防ぐ。さらに公開済み判定を crates.io 上のバージョン
# 有無で行うことで冪等性を担保する。タグ作成と公開を同一ジョブ内で完結させる
# ことで、GITHUB_TOKEN が push したタグでは後続ワークフローが起動しない GitHub
# Actions の再帰防止仕様を回避している。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # タグの作成・push に必要
  id-token: write # trusted publishing (OIDC) のトークン取得に必要

jobs:
  release:
    # Karabiner-Elements は macOS 専用。cargo publish の検証ビルドを実際の
    # ターゲットで通すため macOS ランナーで実行する。
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if version already published on crates.io
        id: check_published
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # crates.io のスパースインデックスでバージョンの有無を確認する。
          # 該当バージョンの行が存在すれば公開済みとみなしてスキップする。
          if curl -sSf "https://index.crates.io/ke/_a/ke_auto_profile_switcher" \
            | grep -q "\"vers\":\"$VERSION\""; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION is already published on crates.io. Skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION is not published yet. Proceeding with release."
          fi

      - name: Install Rust toolchain
        if: steps.check_published.outputs.exists == 'false'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Authenticate with crates.io (trusted publishing)
        if: steps.check_published.outputs.exists == 'false'
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        if: steps.check_published.outputs.exists == 'false'
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      # 公開が成功してからタグを作成・push する。これにより公開失敗時に
      # タグだけが残ることを防ぐ。タグが既に存在する場合は作成・push を
      # スキップして冪等にする。
      - name: Create and push tag
        if: steps.check_published.outputs.exists == 'false'
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists locally. Skipping tag creation."
          elif git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists on origin. Skipping tag push."
          else
            git tag "${{ steps.version.outputs.tag }}"
            git push origin "${{ steps.version.outputs.tag }}"
          fi

      # ここから先は Homebrew 配布（パターン B）用。crates.io 公開と同じ
      # 「未公開のときだけ」実行し、macOS universal binary を生成して GitHub
      # Releases に添付し、個人 tap の formula を自動更新する。
      - name: Add cross-compilation targets
        if: steps.check_published.outputs.exists == 'false'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build universal binary (arm64 + x86_64)
        if: steps.check_published.outputs.exists == 'false'
        id: build_binary
        run: |
          # macos-latest は arm64 ランナー。x86_64 は SDK 同梱でクロスビルドできる。
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          lipo -create -output kaps \
            target/aarch64-apple-darwin/release/kaps \
            target/x86_64-apple-darwin/release/kaps
          lipo -info kaps
          tar -czf kaps-universal-apple-darwin.tar.gz kaps
          SHA=$(shasum -a 256 kaps-universal-apple-darwin.tar.gz | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "Universal binary sha256: $SHA"

      - name: Create GitHub Release with universal binary
        if: steps.check_published.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            kaps-universal-apple-darwin.tar.gz \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "Prebuilt macOS universal binary (arm64 + x86_64) for Homebrew. Install with \`brew install Layzie/tap/kaps\`." \
            --verify-tag

      # 個人 tap (Layzie/homebrew-tap) の Formula/kaps.rb を新しい
      # url/sha256/version で更新する。GITHUB_TOKEN は別リポジトリへ push
      # できないため、tap 限定の fine-grained PAT (HOMEBREW_TAP_TOKEN) を使う。
      - name: Update Homebrew tap formula
        if: steps.check_published.outputs.exists == 'false'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.build_binary.outputs.sha256 }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/Layzie/homebrew-tap.git" tap
          mkdir -p tap/Formula
          sed -e "s/__VERSION__/${VERSION}/g" -e "s/__SHA256__/${SHA256}/g" \
            .github/homebrew/kaps.rb.tmpl > tap/Formula/kaps.rb
          cd tap
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add Formula/kaps.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date. Nothing to commit."
          else
            git commit -m "kaps ${VERSION}"
            git push
          fi
